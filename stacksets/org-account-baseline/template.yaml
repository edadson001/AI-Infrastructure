AWSTemplateFormatVersion: '2010-09-09'
Description: Organization-wide account baseline StackSet.

Resources:
  BaselineAccessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
