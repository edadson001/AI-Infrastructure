AWSTemplateFormatVersion: '2010-09-09'
Description: Product-managed KMS key for the data pipeline bundle.

Parameters:
  EnvironmentName:
    Type: String
  DataDomainName:
    Type: String

Resources:
  DataKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      Description: !Sub 'KMS key for ${EnvironmentName}-${DataDomainName} pipeline assets'
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

Outputs:
  KmsKeyArn:
    Value: !GetAtt DataKey.Arn
