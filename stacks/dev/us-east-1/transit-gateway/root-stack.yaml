AWSTemplateFormatVersion: '2010-09-09'
Description: Runnable dev Transit Gateway stack with route domains and RAM sharing.

Parameters:
  NamePrefix:
    Type: String
  AmazonSideAsn:
    Type: Number
    Default: 64512
  SpokeAccountIds:
    Type: CommaDelimitedList

Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: !Ref AmazonSideAsn
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: disable
      DefaultRouteTablePropagation: disable
      DnsSupport: enable
      Tags:
        - Key: Name
          Value: !Sub '${NamePrefix}-tgw'

  SpokeRouteTable:
    Type: AWS::EC2::TransitGatewayRouteTable
    Properties:
      TransitGatewayId: !Ref TransitGateway
      Tags:
        - Key: Name
          Value: !Sub '${NamePrefix}-spoke-rt'

  InspectionRouteTable:
    Type: AWS::EC2::TransitGatewayRouteTable
    Properties:
      TransitGatewayId: !Ref TransitGateway
      Tags:
        - Key: Name
          Value: !Sub '${NamePrefix}-inspection-rt'

  TransitGatewayShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: !Sub '${NamePrefix}-tgw-share'
      AllowExternalPrincipals: false
      Principals: !Ref SpokeAccountIds
      ResourceArns:
        - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway/${TransitGateway}'

Outputs:
  TransitGatewayId:
    Value: !Ref TransitGateway
    Export:
      Name: dev-us-east-1-TransitGatewayId
  SpokeRouteTableId:
    Value: !Ref SpokeRouteTable
    Export:
      Name: dev-us-east-1-SpokeRouteTableId
  InspectionRouteTableId:
    Value: !Ref InspectionRouteTable
    Export:
      Name: dev-us-east-1-InspectionRouteTableId
  TransitGatewayShareArn:
    Value: !GetAtt TransitGatewayShare.Arn
    Export:
      Name: dev-us-east-1-TransitGatewayShareArn
